<style>
body {
    margin: 0;
    font-family: 'Ink Free', sans-serif;
    background: #000000;
    color: white;
    text-align: center;
}

/* 🌈 NEON HEADER */
@keyframes neonMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

header {
    padding: 60px 20px;
    background: linear-gradient(270deg,
        #00ffff,
        #ff00ff,
        #00ff66,
        #ffcc00,
        #00ffff
    );
    background-size: 1000% 1000%;
    animation: neonMove 18s ease infinite;
    box-shadow: 0 0 40px #0ff;
}

h1 {
    font-size: 55px;
    text-shadow: 0 0 10px #0ff, 0 0 30px #f0f, 0 0 60px #0ff;
    margin: 0;
}

.server-ip {
    margin-top: 10px;
    font-size: 18px;
    color: #000;
    font-weight: bold;
}

/* BUTTONS */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    border: 2px solid #0ff;
    color: #0ff;
    text-decoration: none;
    border-radius: 10px;
    box-shadow: 0 0 10px #0ff;
    transition: 0.3s;
    cursor: pointer;
}

.btn:hover {
    background: #0ff;
    color: black;
    box-shadow: 0 0 25px #0ff;
}

section {
    padding: 40px;
}

.server-img {
    width: 70%;
    max-width: 650px;
    border-radius: 15px;
    box-shadow: 0 0 30px #0ff;
}

footer {
    margin-top: 40px;
    padding: 20px;
    color: gray;
    font-size: 14px;
}

.small {
    font-size: 12px;
    color: #777;
}

/* INFO BOX */
.ip-box {
    margin-top: 15px;
}
</style>
</head>
